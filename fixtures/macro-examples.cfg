# Macro Prompt Protocol v1 fixture macros
#
# These macros emit the same command streams as fixtures.json. They are intended
# for manual frontend testing after enabling Klipper's [respond] module.
#
# Image examples expect static assets under:
#   ~/printer_data/config/prompt-assets/

[gcode_macro MPP_CORE_BASIC]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Core Prompt"
    RESPOND TYPE=command MSG="action:prompt_text Home all axes before continuing."
    RESPOND TYPE=command MSG="action:prompt_button Home|G28|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|RESPOND TYPE=command MSG=\"action:prompt_end\"|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_LIVE_APPEND_AFTER_SHOW]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Live Status"
    RESPOND TYPE=command MSG="action:prompt_text Heating nozzle..."
    RESPOND TYPE=command MSG="action:prompt_show"
    RESPOND TYPE=command MSG="action:prompt_text Nozzle ready."
    RESPOND TYPE=command MSG="action:prompt_footer_button Continue|RESUME|primary"

[gcode_macro MPP_REPLACE_ACTIVE_PROMPT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin First Prompt"
    RESPOND TYPE=command MSG="action:prompt_text This content is replaced."
    RESPOND TYPE=command MSG="action:prompt_show"
    RESPOND TYPE=command MSG="action:prompt_begin Replacement Prompt"
    RESPOND TYPE=command MSG="action:prompt_text Replacement content."
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_BUTTON_FIELD_DEFAULTS]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Button Defaults"
    RESPOND TYPE=command MSG="action:prompt_button M117 hello"
    RESPOND TYPE=command MSG="action:prompt_button Upper Style|M117 styled|Primary"
    RESPOND TYPE=command MSG="action:prompt_button Unknown Style|M117 unknown|neon"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done||"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_BUTTON_GROUP]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Jog Distance"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button +10|_MOVE_PLUS_10|secondary"
    RESPOND TYPE=command MSG="action:prompt_button +1|_MOVE_PLUS_1|secondary"
    RESPOND TYPE=command MSG="action:prompt_button -1|_MOVE_MINUS_1|secondary"
    RESPOND TYPE=command MSG="action:prompt_button -10|_MOVE_MINUS_10|secondary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_IMAGE_ALT_SCALE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Image Prompt"
    RESPOND TYPE=command MSG="action:prompt_image config/prompt-assets/spool.svg|Blue PLA spool preview|0.75"
    RESPOND TYPE=command MSG="action:prompt_image config/prompt-assets/nozzle.png||0.5"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_INVALID_IMAGE_PATHS]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Invalid Images"
    RESPOND TYPE=command MSG="action:prompt_image /tmp/nozzle.png|Absolute path rejected|1"
    RESPOND TYPE=command MSG="action:prompt_image ~/nozzle.png|Home path rejected|1"
    RESPOND TYPE=command MSG="action:prompt_image config/../secret.svg|Parent traversal rejected|1"
    RESPOND TYPE=command MSG="action:prompt_image config/prompt-assets/valid.svg|Valid image|1"
    RESPOND TYPE=command MSG="action:prompt_text Still renders."
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_PROMPT_MARKUP]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Markup Prompt"
    RESPOND TYPE=command MSG="action:prompt_markup <b><color:#22c55e>Ready &amp; safe</color></b>\n<size:small>Use &lt;care&gt; near the nozzle.</size>"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_ROW_LAYOUT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Spool Row"
    RESPOND TYPE=command MSG="action:prompt_row_start"
    RESPOND TYPE=command MSG="action:prompt_image config/prompt-assets/spool.svg|Spool preview|0.35"
    RESPOND TYPE=command MSG="action:prompt_markup <b>Blue PLA</b>\n<size:small>215 C</size>"
    RESPOND TYPE=command MSG="action:prompt_button Select|_SELECT_SPOOL|primary"
    RESPOND TYPE=command MSG="action:prompt_row_end"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_TARGET_TOUCH_ONLY]
gcode:
    RESPOND TYPE=command MSG="action:prompt_target klipperscreen,touch"
    RESPOND TYPE=command MSG="action:prompt_begin Touch Prompt"
    RESPOND TYPE=command MSG="action:prompt_text Use the touchscreen to continue."
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_TARGET_LAST_WINS]
gcode:
    RESPOND TYPE=command MSG="action:prompt_target web"
    RESPOND TYPE=command MSG="action:prompt_target fluidd"
    RESPOND TYPE=command MSG="action:prompt_begin Fluidd Only"
    RESPOND TYPE=command MSG="action:prompt_text This should only match Fluidd."
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_UNKNOWN_COMMANDS_IGNORED]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Unknown Commands"
    RESPOND TYPE=command MSG="action:prompt_confetti on"
    RESPOND TYPE=command MSG="action:prompt_text Known text survives."
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro MPP_END_CLEARS_PROMPT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Close Me"
    RESPOND TYPE=command MSG="action:prompt_text This prompt closes."
    RESPOND TYPE=command MSG="action:prompt_show"
    RESPOND TYPE=command MSG="action:prompt_end"

# Helper macros referenced by fixture buttons. They are harmless placeholders
# for manual tests and keep button gcode simple.

[gcode_macro _MOVE_PLUS_10]
gcode:
    RESPOND MSG="move +10"

[gcode_macro _MOVE_PLUS_1]
gcode:
    RESPOND MSG="move +1"

[gcode_macro _MOVE_MINUS_1]
gcode:
    RESPOND MSG="move -1"

[gcode_macro _MOVE_MINUS_10]
gcode:
    RESPOND MSG="move -10"

[gcode_macro _SELECT_SPOOL]
gcode:
    RESPOND MSG="select spool"
